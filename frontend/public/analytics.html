<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics – Neem Sourcing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
    <style>
        .stat-card {
            border-radius: 14px;
            border: 1px solid #e0e8d9;
            background: #fff;
            box-shadow: 0 2px 10px rgba(40, 80, 40, 0.06);
            padding: 1.25rem;
            text-align: center;
            transition: transform .2s, box-shadow .2s
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 80, 40, 0.12)
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2d5a27
        }

        .stat-label {
            font-size: 0.8rem;
            color: #6b7c63;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.2rem
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 140px;
            padding-top: 10px
        }

        .bar {
            flex: 1;
            min-width: 24px;
            border-radius: 6px 6px 0 0;
            background: linear-gradient(to top, #2d5a27, #4a9c3c);
            position: relative;
            transition: height .5s ease
        }

        .bar .bar-val {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: #2d5a27;
            font-weight: 600;
            white-space: nowrap
        }

        .bar .bar-label {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #888;
            white-space: nowrap
        }

        .table-rank {
            width: 100%;
            font-size: 0.85rem;
            border-collapse: collapse
        }

        .table-rank th {
            background: #f7faf5;
            color: #2d5a27;
            padding: 6px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e8d9
        }

        .table-rank td {
            padding: 6px 10px;
            border-bottom: 1px solid #f0f4ec
        }

        .table-rank tr:hover td {
            background: #f7faf5
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #2d5a27
        }

        .rating-stars-d {
            color: #f0ad4e;
            letter-spacing: 2px
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a class="navbar-brand" href="#" id="navBrand">Neem Sourcing</a>
        <button class="nav-hamburger" id="hamburger" aria-label="Menu">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="products.html?my=1" data-i18n="My products">My products</a>
            <a href="orders.html" data-i18n="Orders">Orders</a>
            <a href="analytics.html" style="font-weight:600;" data-i18n="Analytics">Analytics</a>
            <a href="chat.html" data-i18n="Chat">Chat</a>
            <button type="button" class="btn btn-outline btn-sm" id="logoutBtn" data-i18n="Log out">Log out</button>
        </div>
    </nav>

    <div class="container-wide page">
        <h1 class="page-title" id="pageTitle">📊 <span data-i18n="Supplier Analytics">Supplier Analytics</span></h1>

        <!-- KPI Cards row -->
        <div class="row g-3 mb-4" id="kpiRow">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="kpiRevenue">–</div>
                    <div class="stat-label" data-i18n="Total Revenue">Total Revenue</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="kpiOrders">–</div>
                    <div class="stat-label" data-i18n="Total Orders">Total Orders</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="kpiFulfilled">–</div>
                    <div class="stat-label" data-i18n="Fulfilled">Fulfilled</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="kpiRating">–</div>
                    <div class="stat-label" data-i18n="Avg Rating">Avg Rating</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Monthly Revenue Chart -->
            <div class="col-md-7">
                <div class="card card-body">
                    <div class="section-title">📈 <span data-i18n="Monthly Revenue">Monthly Revenue</span></div>
                    <div class="bar-chart" id="monthlyChart"></div>
                </div>
            </div>

            <!-- Order Status Breakdown -->
            <div class="col-md-5">
                <div class="card card-body">
                    <div class="section-title">📋 <span data-i18n="Order Status">Order Status</span></div>
                    <div id="statusBreakdown"></div>
                </div>
            </div>

            <!-- Top Buyers -->
            <div class="col-md-6">
                <div class="card card-body">
                    <div class="section-title">👤 <span data-i18n="Top Buyers">Top Buyers</span></div>
                    <table class="table-rank">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Buyer</th>
                                <th>Orders</th>
                                <th>Revenue</th>
                            </tr>
                        </thead>
                        <tbody id="topBuyers">
                            <tr>
                                <td colspan="4" class="text-muted text-small">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Top Products -->
            <div class="col-md-6">
                <div class="card card-body">
                    <div class="section-title">🌿 <span data-i18n="Top Products">Top Products</span></div>
                    <table class="table-rank">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Product</th>
                                <th>Orders</th>
                                <th>Revenue</th>
                            </tr>
                        </thead>
                        <tbody id="topProducts">
                            <tr>
                                <td colspan="4" class="text-muted text-small">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Ratings & Reviews -->
            <div class="col-12">
                <div class="card card-body">
                    <div class="section-title">⭐ <span data-i18n="Ratings & Reviews">Ratings & Reviews</span></div>
                    <div id="reviewsList" class="text-muted text-small">Loading…</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (!requireAuth('supplier')) throw new Error('auth');
        const user = getUser();
        document.getElementById('navBrand').href = 'dashboard-supplier.html';
        document.getElementById('logoutBtn').onclick = () => { clearAuth(); location.href = 'index.html'; };
        document.getElementById('hamburger').onclick = () => document.getElementById('navLinks').classList.toggle('open');

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        const months = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        (async () => {
            try {
                const d = await api('/api/analytics/supplier');

                // KPIs
                document.getElementById('kpiRevenue').textContent = '₹' + Number(d.revenue).toLocaleString('en-IN');
                document.getElementById('kpiOrders').textContent = d.totalOrders;
                document.getElementById('kpiFulfilled').textContent = d.fulfilled;
                document.getElementById('kpiRating').innerHTML = d.avgRating
                    ? `${d.avgRating} <span style="font-size:0.9rem;color:#f0ad4e">★</span>`
                    : '—';

                // Monthly chart
                const chartEl = document.getElementById('monthlyChart');
                if (d.monthlyTrend?.length) {
                    const maxRev = Math.max(...d.monthlyTrend.map(m => m.revenue), 1);
                    chartEl.innerHTML = d.monthlyTrend.map(m => {
                        const h = Math.max(12, Math.round((m.revenue / maxRev) * 120));
                        return `<div class="bar" style="height:${h}px">
              <span class="bar-val">₹${(m.revenue / 1000).toFixed(1)}K</span>
              <span class="bar-label">${months[m._id.month]} '${String(m._id.year).slice(-2)}</span>
            </div>`;
                    }).join('');
                } else {
                    chartEl.innerHTML = '<div class="text-muted text-small" style="padding:2rem 0">No revenue data yet. Fulfill orders to see trends.</div>';
                }

                // Status breakdown
                const sEl = document.getElementById('statusBreakdown');
                const statuses = ['pending', 'accepted', 'fulfilled', 'rejected', 'cancelled'];
                const colors = { pending: '#ffc107', accepted: '#28a745', fulfilled: '#007bff', rejected: '#dc3545', cancelled: '#6c757d' };
                const total = d.totalOrders || 1;
                sEl.innerHTML = statuses.map(s => {
                    const cnt = d.byStatus[s] || 0;
                    const pct = Math.round(cnt / total * 100);
                    return `<div class="d-flex align-items-center gap-2 mb-2">
            <span style="width:90px;font-size:0.8rem;text-transform:capitalize">${s}</span>
            <div style="flex:1;background:#f0f4ec;border-radius:6px;height:16px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${colors[s]};border-radius:6px;transition:width .5s"></div>
            </div>
            <span style="width:50px;font-size:0.75rem;text-align:right;color:#555">${cnt} (${pct}%)</span>
          </div>`;
                }).join('');

                // Top buyers
                const tbEl = document.getElementById('topBuyers');
                if (d.topBuyers?.length) {
                    tbEl.innerHTML = d.topBuyers.map((b, i) => `<tr>
            <td>${i + 1}</td>
            <td>${esc(b.buyer.businessName || b.buyer.name)}</td>
            <td>${b.count}</td>
            <td>₹${Number(b.total).toLocaleString('en-IN')}</td>
          </tr>`).join('');
                } else { tbEl.innerHTML = '<tr><td colspan="4" class="text-muted">No buyers yet</td></tr>'; }

                // Top products
                const tpEl = document.getElementById('topProducts');
                if (d.topProducts?.length) {
                    tpEl.innerHTML = d.topProducts.map((p, i) => `<tr>
            <td>${i + 1}</td>
            <td>${esc(p.product?.name || 'Product')} <span class="text-muted text-small">${p.product?.category || ''}</span></td>
            <td>${p.count}</td>
            <td>₹${Number(p.revenue).toLocaleString('en-IN')}</td>
          </tr>`).join('');
                } else { tpEl.innerHTML = '<tr><td colspan="4" class="text-muted">No products yet</td></tr>'; }

                // Reviews
                const rvEl = document.getElementById('reviewsList');
                const rv = await api('/api/orders/reviews/supplier/' + user._id);
                if (rv.reviews?.length) {
                    rvEl.innerHTML = `<div class="mb-2"><strong>${rv.avg} / 5</strong> <span class="rating-stars-d">${'★'.repeat(Math.round(rv.avg))}${'☆'.repeat(5 - Math.round(rv.avg))}</span> <span class="text-muted">(${rv.count} reviews)</span></div>` +
                        rv.reviews.map(r => `<div class="d-flex gap-2 mb-2 align-items-start" style="background:#f7faf5;border-radius:8px;padding:0.5rem 0.75rem;">
              <span style="color:#f0ad4e;font-weight:700;min-width:32px;">${r.rating}★</span>
              <div>
                <span class="text-small"><strong>${esc(r.buyerId?.businessName || r.buyerId?.name || 'Buyer')}</strong></span>
                ${r.comment ? `<p class="mb-0 text-small">"${esc(r.comment)}"</p>` : ''}
                <span class="text-small text-muted">${new Date(r.createdAt).toLocaleDateString('en-IN')}</span>
              </div>
            </div>`).join('');
                } else { rvEl.textContent = 'No reviews yet. Reviews appear after buyers rate fulfilled orders.'; }

            } catch (e) {
                console.error(e);
                document.getElementById('kpiRevenue').textContent = '—';
                document.getElementById('topBuyers').innerHTML = '<tr><td colspan="4" class="text-muted">Could not load analytics.</td></tr>';
            }
        })();
    </script>
    <script src="js/i18n.js"></script>
</body>

</html>
