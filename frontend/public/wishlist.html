<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist – Neem Sourcing</title>
        <link href="vendor/css/fonts.css" rel="stylesheet">
    <link href="vendor/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a class="navbar-brand" href="dashboard-shop.html">Neem Sourcing</a>
        <button class="nav-hamburger" id="hamburger" aria-label="Menu">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="products.html" data-i18n="Products">Products</a>
            <a href="orders.html" data-i18n="Orders">Orders</a>
            <a href="map.html" data-i18n="Map">Map</a>
            <a href="chat.html" data-i18n="Chat">Chat</a>
            <a href="dashboard-shop.html" data-i18n="Dashboard">Dashboard</a>
            <button type="button" class="btn btn-outline btn-sm" id="logoutBtn" data-i18n="Log out">Log out</button>
        </div>
    </nav>

    <div class="container-wide page">
        <h1 class="page-title">❤️ <span data-i18n="Wishlist">Saved Products</span></h1>
        <p class="text-muted mb-3">Products you've saved for later. Click the heart to remove.</p>
        <div id="wishlistGrid" class="row g-3">
            <div class="col-12 text-muted">Loading…</div>
        </div>
        <p class="text-muted text-small mt-3" id="emptyState"></p>
    </div>

    <script src="js/app.js"></script>
    <script src="js/i18n.js"></script>
    <script>
        if (!requireAuth('shop')) throw new Error('auth');
        document.getElementById('logoutBtn').onclick = () => { clearAuth(); location.href = 'index.html'; };
        document.getElementById('hamburger').onclick = () => {
            document.getElementById('navLinks').classList.toggle('open');
        };

        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        async function loadWishlist() {
            const grid = document.getElementById('wishlistGrid');
            const empty = document.getElementById('emptyState');
            try {
                const products = await api('/api/wishlist');
                grid.innerHTML = '';
                if (!products.length) {
                    empty.textContent = 'No saved products yet. Browse products and tap 🤍 to save.';
                    return;
                }
                products.forEach(p => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4';
                    col.id = 'wl-' + p._id;
                    const icon = p.category?.toLowerCase().includes('oil') ? '🫒'
                        : p.category?.toLowerCase().includes('kernel') || p.category?.toLowerCase().includes('seed') ? '🌱'
                            : p.category?.toLowerCase().includes('cake') ? '🟫'
                                : p.category?.toLowerCase().includes('leaf') || p.category?.toLowerCase().includes('leave') ? '🍃'
                                    : '🌿';
                    const img = p.images?.length
                        ? `<img src="${p.images[0]}" style="height:160px;width:100%;object-fit:cover;" onerror="this.outerHTML='<div style=\\'height:160px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,#e8f5e1,#f0f7ec)\\'>${icon}</div>'">`
                        : `<div style="height:160px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,#e8f5e1,#f0f7ec)">${icon}</div>`;

                    col.innerHTML = `<div class="card h-100" style="border-radius:14px;overflow:hidden;border:1px solid #e0e8d9;">
            ${img}
            <div class="card-body" style="padding:1rem;">
              <div class="d-flex justify-between align-center mb-1">
                <h3 class="card-title mb-0" style="font-size:1rem;">${esc(p.name)}</h3>
                <button class="wishlist-btn saved" onclick="removeWishlist('${p._id}')" title="Remove">❤️</button>
              </div>
              ${p.category ? `<p class="text-muted text-small mb-1">${esc(p.category)}</p>` : ''}
              <p class="mb-2"><strong>₹${Number(p.pricePerUnit || 0).toLocaleString()}</strong> / ${esc(p.unit || 'kg')}</p>
              ${p.supplierId ? `<p class="text-small text-muted mb-2">${esc(p.supplierId.businessName || p.supplierId.name || '')}</p>` : ''}
              <a href="product-detail.html?id=${p._id}" class="btn btn-primary btn-sm">View & order</a>
            </div>
          </div>`;
                    grid.appendChild(col);
                });
            } catch (e) {
                grid.innerHTML = '<div class="col-12 text-muted">Could not load wishlist.</div>';
            }
        }

        async function removeWishlist(pid) {
            try {
                await api('/api/wishlist/' + pid, { method: 'DELETE' });
                const el = document.getElementById('wl-' + pid);
                if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }
                // Check if empty
                setTimeout(() => {
                    if (document.getElementById('wishlistGrid').children.length === 0) {
                        document.getElementById('emptyState').textContent = 'No saved products. Browse and tap 🤍 to save.';
                    }
                }, 400);
            } catch (_) { }
        }

        loadWishlist();
    </script>
</body>

</html>
