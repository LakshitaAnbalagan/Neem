<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – Neem Sourcing</title>
  <link href="vendor/css/fonts.css" rel="stylesheet">
  <link href="vendor/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar">
    <a class="navbar-brand" href="#" id="navBrand">Neem Sourcing</a>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="#" id="navProducts" data-i18n="Products">Products</a>
      <a href="orders.html" data-i18n="Orders">Orders</a>
      <a href="map.html" id="navMap" data-i18n="Map">Map</a>
      <a href="chat.html" id="navChat" data-i18n="Chat">Chat</a>
      <a href="#" id="navDashboard" data-i18n="Dashboard">Dashboard</a>
      <button type="button" class="btn btn-outline btn-sm" id="logoutBtn" data-i18n="Log out">Log out</button>
    </div>
  </nav>

  <div class="container-wide page">
    <h1 class="page-title d-flex align-center justify-between flex-wrap gap-2">
      <span id="pageTitle" data-i18n="Neem products">Neem products</span>
      <div class="d-flex gap-2 align-center flex-wrap">
        <a href="wishlist.html" class="btn btn-outline btn-sm" id="wishlistLink" style="display:none">❤️ <span
            data-i18n="Wishlist">Wishlist</span></a>
        <a href="dashboard-supplier.html" class="btn btn-primary btn-sm hide" id="addProductLink"
          data-i18n="Add product">Add product</a>
      </div>
    </h1>

    <!-- ── Search & Filters ── -->
    <div class="card card-body mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label" data-i18n="Search neem products">Search neem products</label>
          <input type="text" id="search" class="form-control"
            placeholder="e.g. Neem oil, oil for pesticide, cake for soil">
        </div>
        <div class="col-md-2">
          <label class="form-label" data-i18n="Neem category">Neem category</label>
          <input type="text" id="category" class="form-control" placeholder="Oil, Kernels, Leaves">
        </div>
        <div class="col-md-2" id="filterMaxMoistureWrap">
          <label class="form-label" data-i18n="Max moisture (%)">Max moisture (%)</label>
          <input type="number" id="maxMoisture" class="form-control" min="0" max="100" step="0.5" placeholder="e.g. 12">
        </div>
        <div class="col-md-2" id="filterMinPpmWrap">
          <label class="form-label" data-i18n="Min PPM">Min PPM</label>
          <input type="number" id="minPpm" class="form-control" min="0" step="1" placeholder="e.g. 1000">
        </div>
        <div class="col-md-2">
          <button type="button" class="btn btn-primary w-100" id="btnSearch" data-i18n="Search">Search</button>
        </div>
      </div>

      <!-- Advanced Filters Toggle -->
      <div class="mt-2" id="advancedWrap">
        <button type="button" class="filter-toggle" id="advFilterToggle">▼ <span data-i18n="Advanced Filters">Advanced
            Filters</span></button>
        <div class="advanced-filters" id="advFilters">
          <div class="row g-2 mt-2">
            <div class="col-md-3">
              <label class="form-label" data-i18n="Price range">Price range</label>
              <div class="d-flex gap-1">
                <input type="number" id="minPrice" class="form-control form-control-sm" placeholder="Min ₹" min="0">
                <input type="number" id="maxPrice" class="form-control form-control-sm" placeholder="Max ₹" min="0">
              </div>
            </div>
            <div class="col-md-2">
              <label class="form-label" data-i18n="Location / State">Location / State</label>
              <input type="text" id="filterLocation" class="form-control form-control-sm" placeholder="e.g. Tamil Nadu">
            </div>
            <div class="col-md-2">
              <label class="form-label" data-i18n="Availability">Availability</label>
              <select id="filterAvail" class="form-control form-control-sm">
                <option value="">All</option>
                <option value="instock" data-i18n="In stock">In stock</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label" data-i18n="Sort by">Sort by</label>
              <select id="filterSort" class="form-control form-control-sm">
                <option value="">Default</option>
                <option value="price_asc">Price: Low → High</option>
                <option value="price_desc">Price: High → Low</option>
                <option value="trust_desc">Trust: Highest</option>
                <option value="newest">Newest first</option>
              </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button type="button" class="btn btn-outline btn-sm w-100" onclick="clearFilters()"
                data-i18n="Clear filters">Clear filters</button>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex align-items-center gap-2 mt-2" id="smartSearchWrap">
        <label class="form-check-label text-small">
          <input type="checkbox" class="form-check-input" id="smartSearch" title="Use AI to interpret your search">
          <span class="text-muted">Smart search</span> <span class="text-primary">(AI)</span>
        </label>
      </div>
      <p class="text-small text-muted mt-2 mb-0">Use moisture, PPM, price, and location filters to find products
        matching
        your requirements.</p>
    </div>

    <div class="alert alert-info d-flex align-center gap-2" id="seasonBanner">
      <span class="season-badge" id="seasonBadge">Season</span>
      <span id="seasonText">Loading seasonal tip…</span>
    </div>
    <div id="productList" class="row g-3"></div>
    <p class="text-muted text-small mt-3" id="emptyState"></p>
  </div>

  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    const user = getUser();
    const isSupplier = user?.role === 'supplier';
    const isMyProducts = new URLSearchParams(location.search).get('my') === '1';

    // Hamburger menu
    document.getElementById('hamburger').onclick = () => {
      document.getElementById('navLinks').classList.toggle('open');
    };

    document.getElementById('navBrand').href = isSupplier ? 'dashboard-supplier.html' : 'dashboard-shop.html';
    document.getElementById('navDashboard').href = isSupplier ? 'dashboard-supplier.html' : 'dashboard-shop.html';
    document.getElementById('navDashboard').textContent = 'Dashboard';

    if (!isSupplier) {
      document.getElementById('addProductLink').classList.add('hide');
      document.getElementById('wishlistLink').style.display = '';
    } else {
      document.getElementById('addProductLink').classList.remove('hide');
    }
    document.getElementById('pageTitle').textContent = isMyProducts ? 'My products' : 'Neem products';
    document.getElementById('filterMaxMoistureWrap').style.display = isMyProducts ? 'none' : '';
    document.getElementById('filterMinPpmWrap').style.display = isMyProducts ? 'none' : '';
    document.getElementById('smartSearchWrap').style.display = isMyProducts ? 'none' : '';
    document.getElementById('advancedWrap').style.display = isMyProducts ? 'none' : '';
    document.getElementById('seasonBadge').textContent = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][currentSeasonMonth() - 1];
    document.getElementById('seasonText').textContent = getSeasonalTip(currentSeasonMonth());

    if (!isLoggedIn()) location.href = 'login.html';
    document.getElementById('logoutBtn').onclick = () => { clearAuth(); location.href = 'index.html'; };

    // Advanced filter toggle
    document.getElementById('advFilterToggle').onclick = () => {
      document.getElementById('advFilters').classList.toggle('open');
    };

    function clearFilters() {
      ['minPrice', 'maxPrice', 'filterLocation', 'maxMoisture', 'minPpm', 'search', 'category'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.getElementById('filterAvail').value = '';
      document.getElementById('filterSort').value = '';
      loadProducts();
    }

    // Wishlist IDs (preload for heart buttons)
    let wishlistIds = new Set();
    async function loadWishlistIds() {
      if (isSupplier || isMyProducts) return;
      try {
        const ids = await api('/api/wishlist/ids');
        wishlistIds = new Set(ids);
      } catch (_) { }
    }

    async function toggleWishlist(productId, btn) {
      const isSaved = wishlistIds.has(productId);
      try {
        if (isSaved) {
          await api('/api/wishlist/' + productId, { method: 'DELETE' });
          wishlistIds.delete(productId);
          btn.textContent = '🤍';
          btn.classList.remove('saved');
        } else {
          await api('/api/wishlist/' + productId, { method: 'POST' });
          wishlistIds.add(productId);
          btn.textContent = '❤️';
          btn.classList.add('saved');
        }
      } catch (_) { }
    }

    async function loadProducts() {
      const listEl = document.getElementById('productList');
      const emptyEl = document.getElementById('emptyState');
      listEl.innerHTML = '<div class="col-12 text-muted">Loading…</div>';
      emptyEl.textContent = '';
      try {
        const params = new URLSearchParams();
        if (isMyProducts && user?._id) params.set('supplierId', user._id);
        else {
          if (document.getElementById('search').value.trim()) params.set('q', document.getElementById('search').value.trim());
          if (document.getElementById('category').value.trim()) params.set('category', document.getElementById('category').value.trim());
          if (document.getElementById('smartSearch')?.checked) params.set('smart', '1');
          const maxM = document.getElementById('maxMoisture')?.value?.trim();
          if (maxM) params.set('maxMoisture', maxM);
          const minP = document.getElementById('minPpm')?.value?.trim();
          if (minP) params.set('minPpm', minP);
          // Advanced filters
          const minPrice = document.getElementById('minPrice')?.value?.trim();
          const maxPrice = document.getElementById('maxPrice')?.value?.trim();
          if (minPrice) params.set('minPrice', minPrice);
          if (maxPrice) params.set('maxPrice', maxPrice);
          const loc = document.getElementById('filterLocation')?.value?.trim();
          if (loc) params.set('location', loc);
          const avail = document.getElementById('filterAvail')?.value;
          if (avail) params.set('availability', avail);
          const sort = document.getElementById('filterSort')?.value;
          if (sort) params.set('sort', sort);
        }
        let products = await api('/api/products?' + params.toString());

        // Client-side sorting (server may not support all sorts)
        const sort = document.getElementById('filterSort')?.value;
        if (sort === 'price_asc') products.sort((a, b) => (a.pricePerUnit || 0) - (b.pricePerUnit || 0));
        else if (sort === 'price_desc') products.sort((a, b) => (b.pricePerUnit || 0) - (a.pricePerUnit || 0));
        else if (sort === 'trust_desc') products.sort((a, b) => (b.supplierTrustScore || 0) - (a.supplierTrustScore || 0));
        else if (sort === 'newest') products.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        // Client-side price filter
        const minPr = +document.getElementById('minPrice')?.value || 0;
        const maxPr = +document.getElementById('maxPrice')?.value || Infinity;
        if (minPr > 0 || maxPr < Infinity) {
          products = products.filter(p => (p.pricePerUnit || 0) >= minPr && (p.pricePerUnit || 0) <= maxPr);
        }

        listEl.innerHTML = '';
        if (!products.length) {
          emptyEl.textContent = 'No products found. Try different filters or add a product (suppliers).';
          return;
        }
        products.forEach(p => {
          const card = document.createElement('div');
          card.className = 'col-md-6 col-lg-4';
          const trust = p.supplierTrustScore ?? 50;
          const specParts = [];
          if (p.moistureContentPercent != null && p.moistureContentPercent !== '') specParts.push('Moisture ≤' + Number(p.moistureContentPercent) + '%');
          if (p.ppmValue != null && p.ppmValue !== '') specParts.push((p.ppmLabel || 'PPM') + ' ' + Number(p.ppmValue) + ' ppm');
          const specLine = specParts.length ? '<p class="text-small text-muted mb-2">' + specParts.join(' · ') + '</p>' : '';

          const isSaved = wishlistIds.has(p._id);
          const heartBtn = !isMyProducts && !isSupplier
            ? `<button class="wishlist-btn ${isSaved ? 'saved' : ''}" onclick="event.preventDefault();event.stopPropagation();toggleWishlist('${p._id}',this)" title="Save to wishlist">${isSaved ? '❤️' : '🤍'}</button>`
            : '';

          // Tier badge
          const hasTiers = p.priceTiers && p.priceTiers.length > 0;
          const tierBadge = hasTiers ? '<span style="font-size:0.7rem;background:#e8f5e1;color:#2d5a27;padding:2px 6px;border-radius:8px;font-weight:600;margin-left:4px;">BULK DEALS</span>' : '';

          card.innerHTML = `
            <div class="card h-100" style="border-radius:14px;overflow:hidden;border:1px solid #e0e8d9;box-shadow:0 2px 12px rgba(40,80,40,0.07);">
              ${(() => {
              const imgs = p.images && p.images.length ? p.images : [];
              if (imgs.length === 0) {
                const icon = p.category?.toLowerCase().includes('oil') ? '🫒'
                  : p.category?.toLowerCase().includes('kernel') || p.category?.toLowerCase().includes('seed') ? '🌱'
                    : p.category?.toLowerCase().includes('cake') ? '🟫'
                      : p.category?.toLowerCase().includes('leaf') || p.category?.toLowerCase().includes('leave') ? '🍃'
                        : '🌿';
                return `<div style="height:180px;background:linear-gradient(135deg,#e8f5e1 0%,#f0f7ec 100%);display:flex;align-items:center;justify-content:center;font-size:4rem;">${icon}</div>`;
              }
              const uid = 'c' + p._id.slice(-6);
              const dots = imgs.length > 1 ? `<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;">
                  ${imgs.map((_, i) => `<button onclick="slideImg('${uid}',${i})" style="width:8px;height:8px;border-radius:50%;border:none;background:rgba(255,255,255,${i === 0 ? '0.95' : '0.5'});cursor:pointer;padding:0;" id="${uid}dot${i}"></button>`).join('')}
                </div>` : '';
              return `<div id="${uid}" style="position:relative;height:180px;overflow:hidden;">
                  <div id="${uid}track" style="display:flex;height:100%;transition:transform 0.3s ease;">
                    ${imgs.map(src => `<img src="${src}" style="min-width:100%;height:180px;object-fit:cover;flex-shrink:0;" onerror="this.style.display='none'">`).join('')}
                  </div>
                  ${imgs.length > 1 ? `
                    <button onclick="slideImg('${uid}',-1)" style="position:absolute;left:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;">‹</button>
                    <button onclick="slideImg('${uid}',1)"  style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;">›</button>` : ''}
                  ${dots}
                </div>`;
            })()}
              <div class="card-body" style="padding:1rem;">
                <div class="d-flex justify-between align-center mb-2">
                  <h3 class="card-title mb-0" style="font-size:1rem;">${escapeHtml(p.name)}${tierBadge}</h3>
                  <div class="d-flex align-center gap-1">
                    ${heartBtn}
                    ${!isMyProducts && p.supplierId ? `<span class="trust-badge ${trustClass(trust)}">★ ${trust}</span>` : ''}
                  </div>
                </div>
                ${p.category ? `<p class="text-muted text-small mb-1">${escapeHtml(p.category)}</p>` : ''}
                ${specLine}
                ${p.description ? `<p class="text-small mb-2">${escapeHtml(p.description.slice(0, 80))}${p.description.length > 80 ? '…' : ''}</p>` : ''}
                <p class="mb-2"><strong>₹${Number(p.pricePerUnit || 0).toLocaleString()}</strong> / ${escapeHtml(p.unit || 'kg')} · Min ${p.minOrderQuantity || 1} ${p.unit || 'kg'}</p>
                ${p.supplierId ? `<p class="text-small text-muted mb-2">${escapeHtml(p.supplierId.businessName || p.supplierId.name || '')}</p>` : ''}
                <div class="d-flex gap-2 mt-auto">
                  ${isMyProducts
              ? `<a href="product-edit.html?id=${p._id}" class="btn btn-outline btn-sm">Edit</a>`
              : `<a href="product-detail.html?id=${p._id}" class="btn btn-primary btn-sm" data-i18n="View & contact">View & contact</a>`
            }
                </div>
              </div>
            </div>`;

          listEl.appendChild(card);
        });
        if (typeof i18n !== 'undefined') i18n.applyTranslations();
      } catch (e) {
        listEl.innerHTML = '';
        emptyEl.textContent = 'Could not load products. Please log in again or try later.';
      }
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    // ── Image carousel ──────────────────────────────────────────────
    const carouselState = {};
    function slideImg(uid, val) {
      const track = document.getElementById(uid + 'track');
      if (!track) return;
      const total = track.children.length;
      if (!carouselState[uid]) carouselState[uid] = 0;
      if (val === -1 || val === 1) {
        carouselState[uid] = (carouselState[uid] + val + total) % total;
      } else {
        carouselState[uid] = Math.max(0, Math.min(val, total - 1));
      }
      const idx = carouselState[uid];
      track.style.transform = `translateX(-${idx * 100}%)`;
      for (let i = 0; i < total; i++) {
        const dot = document.getElementById(uid + 'dot' + i);
        if (dot) dot.style.background = `rgba(255,255,255,${i === idx ? '0.95' : '0.5'})`;
      }
    }

    document.getElementById('btnSearch').onclick = loadProducts;
    document.getElementById('search').onkeydown = (e) => e.key === 'Enter' && loadProducts();
    loadWishlistIds().then(() => loadProducts());
  </script>
  <script src="js/i18n.js"></script>
  <script src="js/voice-search.js"></script>
</body>

</html>
